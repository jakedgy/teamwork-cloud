clusterName: twc-lab
awsRegion: us-east-2

storageClass:
  # Set create=false to use a pre-existing StorageClass named below.
  create: true
  name: auto-ebs

secrets:
  # Demo credentials are immutable after install; reinstall to change them.
  artemisUser: artemis
  artemisPassword: ""

# Image digests are deliberately deferred until Task 9, after EKS validation.
simulator:
  image:
    repository: ghcr.io/jakedgy/teamwork-cloud
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

cassandra:
  image:
    repository: cassandra
    tag: "4.1.4"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      memory: 3Gi
  persistence:
    # PVC sizes are install-time settings for this single-node prototype.
    size: 8Gi

zookeeper:
  image:
    repository: zookeeper
    tag: "3.9.2"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  persistence:
    # PVC sizes are install-time settings for this single-node prototype.
    size: 2Gi

artemis:
  image:
    repository: apache/activemq-artemis
    tag: "2.32.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
  persistence:
    # PVC sizes are install-time settings for this single-node prototype.
    size: 2Gi
