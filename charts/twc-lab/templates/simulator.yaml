apiVersion: v1
kind: Service
metadata:
  name: {{ include "twc-lab.componentName" (dict "root" . "component" "simulator") }}
  labels:
    {{- include "twc-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: simulator
spec:
  type: ClusterIP
  selector:
    {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "simulator") | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "twc-lab.componentName" (dict "root" . "component" "simulator") }}
  labels:
    {{- include "twc-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "simulator") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/artemis-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "simulator") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: simulator
          image: "{{ .Values.simulator.image.repository }}:{{ .Values.simulator.image.tag }}"
          imagePullPolicy: {{ .Values.simulator.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: TWC_LAB_CASSANDRA_HOST
              value: "{{ include "twc-lab.componentName" (dict "root" . "component" "cassandra") }}:9042"
            - name: TWC_LAB_ZOOKEEPER_HOST
              value: "{{ include "twc-lab.componentName" (dict "root" . "component" "zookeeper") }}:2181"
            - name: TWC_LAB_ARTEMIS_HOST
              value: "{{ include "twc-lab.componentName" (dict "root" . "component" "artemis") }}:61616"
            - name: TWC_LAB_ARTEMIS_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "twc-lab.componentName" (dict "root" . "component" "artemis") }}
                  key: username
            - name: TWC_LAB_ARTEMIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "twc-lab.componentName" (dict "root" . "component" "artemis") }}
                  key: password
            - name: TWC_LAB_CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            - name: TWC_LAB_AWS_REGION
              value: {{ .Values.awsRegion | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.simulator.resources | nindent 12 }}
