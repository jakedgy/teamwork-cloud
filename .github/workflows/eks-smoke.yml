name: EKS smoke test

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: eks-smoke
  cancel-in-progress: false

jobs:
  smoke:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: eks-smoke
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      CLUSTER_NAME: twc-lab-smoke-${{ github.run_id }}
      NETWORK_MODE: managed
      CONFIRM: '1'
      KUBECONFIG: ${{ github.workspace }}/.twc-lab/kubeconfig
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Resolve smoke image tag
        id: smoke-image
        shell: bash
        run: |
          repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          tag="smoke-${GITHUB_RUN_ID}-${GITHUB_SHA:0:12}"
          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish smoke image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.smoke-image.outputs.repository }}:${{ steps.smoke-image.outputs.tag }}

      - name: Validate required repository variables
        shell: bash
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo 'repository variable AWS_ROLE_ARN is required' >&2
            exit 1
          fi
          if [[ -z "$AWS_REGION" ]]; then
            echo 'repository variable AWS_REGION is required' >&2
            exit 1
          fi
          if (( ${#CLUSTER_NAME} > 100 )) || [[ ! "$CLUSTER_NAME" =~ ^[A-Za-z0-9][A-Za-z0-9-]*$ ]]; then
            echo "generated cluster name '$CLUSTER_NAME' is not EKS-valid" >&2
            exit 1
          fi

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: twc-lab-${{ github.run_id }}

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.15.4

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: v1.34.1

      - name: Install eksctl
        shell: bash
        run: |
          archive="$RUNNER_TEMP/eksctl_Linux_amd64.tar.gz"
          bin_dir="$RUNNER_TEMP/eksctl-bin"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            https://github.com/eksctl-io/eksctl/releases/download/v0.229.0/eksctl_Linux_amd64.tar.gz
          echo '4a104d3a2a001de219e227baea1f0513ce6e87e60fef7dfc219cb0694e378829  '"$archive" | sha256sum --check
          mkdir -p "$bin_dir"
          tar --extract --gzip --file "$archive" --directory "$bin_dir" eksctl
          echo "$bin_dir" >> "$GITHUB_PATH"

      - name: Preflight and deploy
        env:
          SIMULATOR_IMAGE_REPOSITORY: ${{ steps.smoke-image.outputs.repository }}
          SIMULATOR_IMAGE_TAG: ${{ steps.smoke-image.outputs.tag }}
        run: |
          make preflight
          make deploy

      - name: Check status and healthy public API
        shell: bash
        run: |
          make status
          hostname="$(kubectl --kubeconfig "$KUBECONFIG" -n ingress-nginx get service ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')"
          if [[ -z "$hostname" ]]; then
            echo 'ingress NLB hostname is empty' >&2
            exit 1
          fi
          health_file="$RUNNER_TEMP/health.json"
          for attempt in {1..30}; do
            if curl --connect-timeout 5 --max-time 10 --fail --silent --show-error \
              "http://${hostname}/api/health" > "$health_file"; then
              if jq --exit-status '.services | length == 3 and all(.status == "ready")' "$health_file" >/dev/null; then
                exit 0
              fi
            fi
            sleep 10
          done
          echo 'public API did not report all three dependencies ready' >&2
          jq . "$health_file" >&2 || true
          exit 1

      - name: Demonstrate Artemis failure and restore
        shell: bash
        run: |
          hostname="$(kubectl --kubeconfig "$KUBECONFIG" -n ingress-nginx get service ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')"
          health_file="$RUNNER_TEMP/failure-health.json"
          make demo-failure SERVICE=artemis
          sleep 20
          make status
          failed='false'
          for attempt in {1..8}; do
            if curl --connect-timeout 5 --max-time 10 --fail --silent --show-error \
              "http://${hostname}/api/health" > "$health_file"; then
              if jq --exit-status '.services | any(.name == "artemis" and .status == "unavailable")' "$health_file" >/dev/null; then
                failed='true'
                break
              fi
            fi
            sleep 5
          done
          if [[ "$failed" != 'true' ]]; then
            echo 'public API did not report the Artemis failure' >&2
            jq . "$health_file" >&2 || true
            exit 1
          fi
          make demo-restore
          make status
          for attempt in {1..24}; do
            if curl --connect-timeout 5 --max-time 10 --fail --silent --show-error \
              "http://${hostname}/api/health" > "$health_file"; then
              if jq --exit-status '.services | length == 3 and all(.status == "ready")' "$health_file" >/dev/null; then
                exit 0
              fi
            fi
            sleep 5
          done
          echo 'public API did not return to all-ready after restore' >&2
          jq . "$health_file" >&2 || true
          exit 1

      - name: Refresh AWS credentials for teardown
        if: always()
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: twc-lab-destroy-${{ github.run_id }}

      - name: Destroy smoke cluster
        if: always()
        run: CONFIRM=1 make destroy
