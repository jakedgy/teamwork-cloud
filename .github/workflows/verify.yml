name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: go.sum

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.15.4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Check shell scripts
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=(scripts/**/*.sh)
          if (( ${#files[@]} == 0 )); then
            echo 'no shell scripts found for ShellCheck' >&2
            exit 1
          fi
          shellcheck "${files[@]}"

      - name: Run free verification
        run: make verify

      - name: Build container
        run: docker build --tag twc-lab:verify .

      - name: Verify non-root image user
        shell: bash
        run: |
          user="$(docker image inspect --format '{{.Config.User}}' twc-lab:verify)"
          if [[ "$user" != '65532:65532' ]]; then
            echo "image user is '$user', want '65532:65532'" >&2
            exit 1
          fi

      - name: Scan container with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: twc-lab:verify
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
