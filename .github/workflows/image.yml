name: Publish image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to publish (for example, v0.1.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve immutable tags
        id: tags
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          version="$GITHUB_REF_NAME"
          if [[ "$GITHUB_EVENT_NAME" == 'workflow_dispatch' ]]; then
            version="$DISPATCH_VERSION"
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version '$version' is not a v-prefixed release version" >&2
            exit 1
          fi
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish multi-architecture image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.image }}:sha-${{ steps.tags.outputs.short_sha }}
          provenance: mode=max
          sbom: true
