apiVersion: v1
kind: Service
metadata:
  name: {{ include "twc-lab.fullname" . }}-cassandra
  labels:
    {{- include "twc-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: cassandra
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "cassandra") | nindent 4 }}
  ports:
    - name: cql
      port: 9042
      targetPort: cql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "twc-lab.fullname" . }}-cassandra
  labels:
    {{- include "twc-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: cassandra
spec:
  serviceName: {{ include "twc-lab.fullname" . }}-cassandra
  replicas: {{ .Values.cassandra.replicaCount }}
  selector:
    matchLabels:
      {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "cassandra") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "cassandra") | nindent 8 }}
    spec:
      containers:
        - name: cassandra
          image: "{{ .Values.cassandra.image.repository }}:{{ .Values.cassandra.image.tag }}"
          imagePullPolicy: {{ .Values.cassandra.image.pullPolicy }}
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            - name: CASSANDRA_DC
              value: datacenter1
            - name: CASSANDRA_RACK
              value: rack1
            - name: CASSANDRA_ENDPOINT_SNITCH
              value: GossipingPropertyFileSnitch
          ports:
            - name: cql
              containerPort: 9042
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: cql
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: cql
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.cassandra.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.storageClass.name }}
        resources:
          requests:
            storage: {{ .Values.cassandra.persistence.size }}
