apiVersion: v1
kind: Service
metadata:
  name: {{ include "twc-lab.componentName" (dict "root" . "component" "artemis") }}
  labels:
    {{- include "twc-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: artemis
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "artemis") | nindent 4 }}
  ports:
    - name: core
      port: 61616
      targetPort: core
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "twc-lab.componentName" (dict "root" . "component" "artemis") }}
  labels:
    {{- include "twc-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: artemis
spec:
  serviceName: {{ include "twc-lab.componentName" (dict "root" . "component" "artemis") }}
  replicas: 1
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
  selector:
    matchLabels:
      {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "artemis") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/artemis-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "artemis") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-data
          image: "{{ .Values.artemis.image.repository }}:{{ .Values.artemis.image.tag }}"
          imagePullPolicy: {{ .Values.artemis.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - chown 1001:1001 /var/lib/artemis-instance
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/artemis-instance
      containers:
        - name: artemis
          image: "{{ .Values.artemis.image.repository }}:{{ .Values.artemis.image.tag }}"
          imagePullPolicy: {{ .Values.artemis.image.pullPolicy }}
          env:
            - name: ARTEMIS_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "twc-lab.componentName" (dict "root" . "component" "artemis") }}
                  key: username
            - name: ARTEMIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "twc-lab.componentName" (dict "root" . "component" "artemis") }}
                  key: password
            - name: ANONYMOUS_LOGIN
              value: "false"
          ports:
            - name: core
              containerPort: 61616
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - /var/lib/artemis-instance/bin/artemis check node --url tcp://127.0.0.1:61616 --user "$ARTEMIS_USER" --password "$ARTEMIS_PASSWORD" --timeout 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - /var/lib/artemis-instance/bin/artemis check node --url tcp://127.0.0.1:61616 --user "$ARTEMIS_USER" --password "$ARTEMIS_PASSWORD" --timeout 5000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.artemis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/artemis-instance
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.storageClass.name }}
        resources:
          requests:
            storage: {{ .Values.artemis.persistence.size }}
