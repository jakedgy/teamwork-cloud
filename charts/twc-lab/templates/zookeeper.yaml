apiVersion: v1
kind: Service
metadata:
  name: {{ include "twc-lab.fullname" . }}-zookeeper
  labels:
    {{- include "twc-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: zookeeper
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "zookeeper") | nindent 4 }}
  ports:
    - name: client
      port: 2181
      targetPort: client
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "twc-lab.fullname" . }}-zookeeper
  labels:
    {{- include "twc-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: zookeeper
spec:
  serviceName: {{ include "twc-lab.fullname" . }}-zookeeper
  replicas: {{ .Values.zookeeper.replicaCount }}
  selector:
    matchLabels:
      {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "zookeeper") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "twc-lab.componentSelectorLabels" (dict "root" . "component" "zookeeper") | nindent 8 }}
    spec:
      containers:
        - name: zookeeper
          image: "{{ .Values.zookeeper.image.repository }}:{{ .Values.zookeeper.image.tag }}"
          imagePullPolicy: {{ .Values.zookeeper.image.pullPolicy }}
          env:
            - name: ZOO_MY_ID
              value: "1"
            - name: ZOO_STANDALONE_ENABLED
              value: "true"
          ports:
            - name: client
              containerPort: 2181
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.zookeeper.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.storageClass.name }}
        resources:
          requests:
            storage: {{ .Values.zookeeper.persistence.size }}
