name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: go.sum

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.15.4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Check shell scripts
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=(scripts/**/*.sh)
          if (( ${#files[@]} == 0 )); then
            echo 'no shell scripts found for ShellCheck' >&2
            exit 1
          fi
          shellcheck "${files[@]}"

      - name: Run free verification
        run: make verify

      - name: Build container
        run: docker build --tag twc-lab:verify .

      - name: Verify non-root image user
        shell: bash
        run: |
          user="$(docker image inspect --format '{{.Config.User}}' twc-lab:verify)"
          if [[ "$user" != '65532:65532' ]]; then
            echo "image user is '$user', want '65532:65532'" >&2
            exit 1
          fi

      - name: Scan container with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: twc-lab:verify
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
